<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Legendas — STL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Montserrat:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #f7f5f2;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header { margin-bottom: 40px; }

  .logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #E43E41;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: #1a1a1a;
    line-height: 1.2;
  }

  h1 em {
    font-style: italic;
    color: #E43E41;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #E43E41;
    margin-top: 16px;
  }

  .form-section {
    background: white;
    border: 1px solid #e8e4df;
    padding: 28px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  select, textarea, input[type="text"] {
    width: 100%;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #f7f5f2;
    border: 1px solid #e8e4df;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  select:focus, textarea:focus, input[type="text"]:focus {
    border-color: #E43E41;
  }

  select {
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23888' stroke-width='1.5'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
    cursor: pointer;
  }

  textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.6;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  .toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    margin-bottom: 16px;
  }

  .toggle input { display: none; }

  .toggle-track {
    width: 36px;
    height: 20px;
    background: #e8e4df;
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle input:checked + .toggle-track { background: #E43E41; }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle input:checked + .toggle-track .toggle-thumb {
    transform: translateX(16px);
  }

  .toggle-label { font-size: 12px; color: #555; }

  .btn {
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover { background: #E43E41; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a1a1a;
    margin-bottom: 16px;
  }

  .char-count {
    font-size: 11px;
    color: #aaa;
    text-align: right;
    margin-top: 4px;
  }

  .results { display: none; margin-top: 24px; }
  .results.visible { display: block; }

  .result-header {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e8e4df;
  }

  .caption-card {
    background: white;
    border: 1px solid #e8e4df;
    padding: 24px;
    margin-bottom: 12px;
  }

  .caption-num {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #E43E41;
    margin-bottom: 12px;
  }

  .caption-text {
    font-size: 14px;
    line-height: 1.7;
    color: #1a1a1a;
    white-space: pre-wrap;
  }

  .copy-btn {
    margin-top: 16px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid #1a1a1a;
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    color: #1a1a1a;
    transition: all 0.2s;
  }

  .copy-btn:hover { background: #1a1a1a; color: white; }
  .copy-btn.copied { background: #E43E41; border-color: #E43E41; color: white; }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    background: white;
    border: 1px solid #e8e4df;
    margin-top: 24px;
  }

  .loading.visible { display: block; }

  .loading-text {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .error {
    display: none;
    background: #fff5f5;
    border: 1px solid #E43E41;
    padding: 16px;
    font-size: 13px;
    color: #E43E41;
    margin-top: 16px;
  }

  .error.visible { display: block; }

  @media (max-width: 500px) {
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Steal The Look</div>
    <h1>Gerador de <em>Legendas</em></h1>
    <div class="divider"></div>
  </header>

  <div class="form-section">
    <div class="section-title">Sobre o conteúdo</div>

    <div class="row">
      <div class="field">
        <label>Formato</label>
        <select id="format">
          <option value="">Selecione</option>
          <option value="carrossel">Carrossel</option>
          <option value="vídeo">Vídeo</option>
          <option value="foto única">Foto única</option>
          <option value="reels">Reels</option>
        </select>
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="category">
          <option value="">Selecione</option>
          <option value="moda">Moda</option>
          <option value="beleza">Beleza</option>
          <option value="tendência">Tendência</option>
          <option value="comportamento">Comportamento</option>
          <option value="lifestyle">Lifestyle</option>
          <option value="celebridade">Celebridade</option>
          <option value="tapete vermelho">Tapete vermelho</option>
          <option value="podcast">Podcast</option>
          <option value="bastidores STL">Bastidores STL</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Resumo do conteúdo</label>
      <textarea id="content" placeholder="Descreva o conteúdo do post. A legenda deve apoiar, não repetir."></textarea>
      <div class="char-count" id="charCount">0 caracteres</div>
    </div>

    <div class="field">
      <label>CTA</label>
      <select id="cta">
        <option value="">Selecione</option>
        <option value="engajamento nos comentários">Engajamento nos comentários</option>
        <option value="link na bio">Link na bio</option>
        <option value="comentar para receber o link por DM">Comentar para receber link por DM</option>
        <option value="assinar newsletter">Assinar newsletter</option>
        <option value="sem CTA">Sem CTA</option>
      </select>
    </div>

    <div class="field">
      <label>Pergunta para engajamento (opcional)</label>
      <input type="text" id="question" placeholder="Ex: Você já apostaria nessa tendência?">
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">Detalhes</div>

    <label class="toggle">
      <input type="checkbox" id="hasCollaborator">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-label">Post com colaboradora</span>
    </label>

    <div class="field" id="collaboratorField" style="display:none">
      <label>@ da colaboradora</label>
      <input type="text" id="collaborator" placeholder="@handle">
    </div>

    <div class="field">
      <label>Contexto adicional (opcional)</label>
      <input type="text" id="context" placeholder="Ex: aproveitar lançamento de filme, Dia da Mulher...">
    </div>

    <div class="field">
      <label>Tom</label>
      <select id="tone">
        <option value="padrão STL">Padrão STL</option>
        <option value="mais humorístico">Mais humorístico</option>
        <option value="mais informativo">Mais informativo</option>
        <option value="mais emocional">Mais emocional</option>
      </select>
    </div>
  </div>

  <button class="btn" id="generateBtn" onclick="generate()">Gerar legendas</button>

  <div class="loading" id="loading">
    <div class="loading-text">Gerando legendas...</div>
  </div>

  <div class="error" id="error"></div>

  <div class="results" id="results">
    <div class="result-header">3 opções de legenda</div>
    <div id="captionCards"></div>
  </div>
</div>

<script>
  document.getElementById('hasCollaborator').addEventListener('change', function() {
    document.getElementById('collaboratorField').style.display = this.checked ? 'block' : 'none';
  });

  document.getElementById('content').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length + ' caracteres';
  });

  async function generate() {
    const content = document.getElementById('content').value.trim();
    if (!content) {
      showError('Descreva o conteúdo do post antes de gerar.');
      return;
    }

    const body = {
      format: document.getElementById('format').value,
      category: document.getElementById('category').value,
      content,
      cta: document.getElementById('cta').value,
      question: document.getElementById('question').value.trim(),
      hasCollaborator: document.getElementById('hasCollaborator').checked,
      collaborator: document.getElementById('collaborator').value.trim(),
      context: document.getElementById('context').value.trim(),
      tone: document.getElementById('tone').value
    };

    hideError();
    showLoading();
    hideResults();
    document.getElementById('generateBtn').disabled = true;

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (!response.ok) throw new Error(data.error || 'Erro ao gerar legendas.');

      const options = parseOptions(data.result);
      showResults(options);
    } catch (err) {
      showError(err.message || 'Erro ao gerar legendas. Tente novamente.');
    } finally {
      hideLoading();
      document.getElementById('generateBtn').disabled = false;
    }
  }

  function parseOptions(text) {
    const options = [];
    const parts = text.split(/OPÇÃO\s+\d+/i).filter(p => p.trim());
    parts.forEach(part => {
      const clean = part.replace(/^[\s:—\-]+/, '').trim();
      if (clean) options.push(clean);
    });
    return options.length > 0 ? options : [text];
  }

  function showResults(options) {
    const container = document.getElementById('captionCards');
    container.innerHTML = '';
    options.forEach((opt, i) => {
      const card = document.createElement('div');
      card.className = 'caption-card';
      const textId = 'caption-' + i;
      card.innerHTML = `
        <div class="caption-num">Opção ${i + 1}</div>
        <div class="caption-text" id="${textId}">${opt}</div>
        <button class="copy-btn" onclick="copyText(this, '${textId}')">Copiar</button>
      `;
      container.appendChild(card);
    });
    document.getElementById('results').classList.add('visible');
  }

  function copyText(btn, textId) {
    const text = document.getElementById(textId).innerText;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copiado!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copiar';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function showLoading() { document.getElementById('loading').classList.add('visible'); }
  function hideLoading() { document.getElementById('loading').classList.remove('visible'); }
  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function hideError() { document.getElementById('error').classList.remove('visible'); }
  function hideResults() { document.getElementById('results').classList.remove('visible'); }
</script>
</body>
</html>
